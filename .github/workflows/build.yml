name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install SDK & Accept Licenses
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Generate debug keystones
        run: |
          for dir in app frontend; do
            if [ ! -f $dir/debug.keystore ]; then
              keytool -genkeypair -v -storetype PKCS12 -keystore $dir/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
            fi
          done

      # ─── Step 1: Build MDM (hidden app) ───
      - name: Build MDM APK
        run: chmod +x gradlew && ./gradlew :app:assembleRelease --no-daemon

      # ─── Step 2: Embed MDM APK into frontend assets ───
      - name: Embed MDM APK into frontend
        run: |
          mkdir -p frontend/src/main/assets
          cp app/build/outputs/apk/release/app-release.apk frontend/src/main/assets/update.apk
          ls -la frontend/src/main/assets/

      # ─── Step 3: Build frontend (Tawasul) APK ───
      - name: Build Tawasul APK
        run: ./gradlew :frontend:assembleRelease --no-daemon

      - name: Upload Tawasul APK
        uses: actions/upload-artifact@v4
        with:
          name: Tawasul-APK
          path: frontend/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload MDM APK (for reference)
        uses: actions/upload-artifact@v4
        with:
          name: MDM-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # ─── Step 4: Send APK to admins via Telegram Bot ───
      - name: Send Tawasul APK via Telegram
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
        run: |
          set -e
          if [ -z "$BOT_TOKEN" ]; then
            echo "BOT_TOKEN secret not set - skipping Telegram upload"
            exit 0
          fi
          if [ -z "$ADMIN_IDS" ]; then
            echo "ADMIN_IDS secret not set - skipping Telegram upload"
            exit 0
          fi

          pip install --quiet pyTelegramBotAPI

          python3 << 'PYEOF'
          import telebot
          import glob
          import os
          import socket
          import time

          bot_token = os.environ["BOT_TOKEN"]
          admin_ids_raw = os.environ["ADMIN_IDS"]
          admin_ids = [int(x.strip()) for x in admin_ids_raw.split(",") if x.strip().isdigit()]

          if not admin_ids:
              print("No valid admin IDs found")
              exit(0)

          bot = telebot.TeleBot(bot_token)

          commit_sha = os.environ.get("GITHUB_SHA", "unknown")[:8]
          repo = os.environ.get("GITHUB_REPOSITORY", "unknown")
          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          build_url = f"https://github.com/{repo}/actions/runs/{run_id}"

          caption = (
              f"📦 *Tawasul APK - New Build*\n\n"
              f"Commit: `{commit_sha}`\n"
              f"Repo: `{repo}`\n"
              f"Build: [View Run]({build_url})\n\n"
              f"⏰ {time.strftime('%Y-%m-%d %H:%M:%S UTC', time.gmtime())}"
          )

          apks = glob.glob("frontend/build/outputs/apk/release/*.apk")
          if not apks:
              print("No APK found")
              exit(1)

          for apk_path in apks:
              file_size_mb = os.path.getsize(apk_path) / (1024 * 1024)
              print(f"Sending {apk_path} ({file_size_mb:.2f} MB) to {len(admin_ids)} admin(s)")

              for admin_id in admin_ids:
                  retry = 0
                  while retry < 3:
                      try:
                          with open(apk_path, "rb") as f:
                              bot.send_document(
                                  admin_id,
                                  f,
                                  caption=caption,
                                  parse_mode="Markdown"
                              )
                          print(f"  Sent to {admin_id}")
                          break
                      except socket.timeout:
                          retry += 1
                          print(f"  Timeout, retry {retry}/3...")
                          time.sleep(5)
                      except Exception as e:
                          retry += 1
                          print(f"  Error to {admin_id}: {e}, retry {retry}/3...")
                          time.sleep(5)
                  else:
                      print(f"  Failed to send to {admin_id} after 3 retries")

          print("Telegram upload complete")
          PYEOF
